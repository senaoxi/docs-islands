name: "Setup Environment"
description: "Setup Node.js, pnpm and dependencies with caching"

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "20"
  playwright:
    description: "Install Playwright browsers"
    required: false
    default: "false"
  frozen-lockfile:
    description: "Use frozen lockfile"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      # actions/setup-node@v5.0.0.
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Setup pnpm via Corepack
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare "$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).packageManager")" --activate
        pnpm --version

    - name: Resolve pnpm store path
      shell: bash
      run: |
        set -euo pipefail
        echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

    - name: Cache pnpm store
      # actions/cache@v5.0.0.
      uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0
      with:
        key: ${{ runner.os }}-pnpm-store-${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}
        path: ${{ env.PNPM_STORE_PATH }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ inputs.node-version }}-
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: |
        # Use frozen-lockfile by default unless explicitly set to false
        if [[ "${{ inputs.frozen-lockfile }}" == "false" ]]; then
          echo "Installing dependencies without frozen lockfile..."
          pnpm install --no-frozen-lockfile
        else
          echo "Installing dependencies with frozen lockfile..."
          pnpm install --frozen-lockfile
        fi

    # Install playwright's binary under custom directory to cache
    - name: (non-windows) Set Playwright path and Get playwright version
      if: inputs.playwright == 'true' && runner.os != 'Windows'
      shell: bash
      run: |
        echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/playwright-bin" >> "$GITHUB_ENV"
        PLAYWRIGHT_VERSION="$(node -p "require('./node_modules/@playwright/test/package.json').version")"
        if [[ -z "$PLAYWRIGHT_VERSION" || "$PLAYWRIGHT_VERSION" == "null" ]]; then
          echo "Failed to resolve Playwright version" >&2
          exit 1
        fi
        echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"

    - name: (windows) Set Playwright path and Get playwright version
      if: inputs.playwright == 'true' && runner.os == 'Windows'
      shell: pwsh
      run: |
        echo "PLAYWRIGHT_BROWSERS_PATH=$HOME\.cache\playwright-bin" >> $env:GITHUB_ENV
        $playwrightVersion = node -p "require('./node_modules/@playwright/test/package.json').version"
        if ([string]::IsNullOrWhiteSpace($playwrightVersion) -or $playwrightVersion -eq "null") {
          throw "Failed to resolve Playwright version"
        }
        echo "PLAYWRIGHT_VERSION=$playwrightVersion" >> $env:GITHUB_ENV

    - name: Cache Playwright's binary
      if: inputs.playwright == 'true'
      # actions/cache@v5.0.0.
      uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0
      with:
        key: ${{ runner.os }}-playwright-bin-v3-shell-${{ env.PLAYWRIGHT_VERSION }}
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

    - name: Install Playwright
      if: inputs.playwright == 'true'
      shell: bash
      # CI runs Chromium headlessly, so only the headless shell is required.
      run: pnpm playwright install --only-shell chromium
