name: Add GitHub Release Tag

on:
  push:
    tags:
      - "logaria/v*"
      - "limina/v*"
      - "vitepress/v*"

jobs:
  release:
    if: github.repository == 'senaoxi/docs-islands'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve changelog path
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          case "${GITHUB_REF_NAME}" in
            logaria/v*)
              changelog_path="packages/logaria/CHANGELOG.md"
              version="${GITHUB_REF_NAME#logaria/v}"
              ;;
            limina/v*)
              changelog_path="packages/limina/CHANGELOG.md"
              version="${GITHUB_REF_NAME#limina/v}"
              ;;
            vitepress/v*)
              changelog_path="packages/vitepress/CHANGELOG.md"
              version="${GITHUB_REF_NAME#vitepress/v}"
              ;;
            *)
              echo "Unsupported release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease="false"
          elif [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            prerelease="true"
          else
            echo "Unsupported release version in tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "changelog_path=${changelog_path}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Create Release for Tag
        if: steps.tag.outputs.changelog_path
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG_PATH: ${{ steps.tag.outputs.changelog_path }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        run: |
          set -euo pipefail

          body="Please refer to [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/${CHANGELOG_PATH}) for details."
          args=(
            "${GITHUB_REF_NAME}"
            --title "${GITHUB_REF_NAME}"
            --notes "${body}"
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create --repo "${GITHUB_REPOSITORY}" "${args[@]}"
